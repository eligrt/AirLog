<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛡 AirLog Admin</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #060e0a;
  --bg2:      #091209;
  --surface:  #0d1f10;
  --raised:   #122818;
  --hover:    #173020;
  --border:   #1a3d20;
  --border2:  #2d6b38;
  --text:     #e8f5ea;
  --text2:    #8fbc94;
  --text3:    #3d6b42;
  --accent:   #22c55e;
  --accent2:  #4ade80;
  --glow:     #22c55e30;
  --cyan:     #22d3ee;
  --amber:    #fbbf24;
  --red:      #f87171;
  --blue:     #60a5fa;
  --mono:     'IBM Plex Mono', monospace;
  --sans:     'IBM Plex Sans Hebrew', sans-serif;
  --r:        12px;
}

html { font-size: 16px; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -100px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 400px;
  background: radial-gradient(ellipse, #22c55e12 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.admin-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.admin-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.admin-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  background: rgba(34,197,94,.1);
  border: 1px solid rgba(34,197,94,.3);
  border-radius: 20px;
  padding: 2px 8px;
  letter-spacing: .08em;
}
.admin-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  font-family: var(--mono);
  letter-spacing: .04em;
}
.admin-subtitle {
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.last-refresh {
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
}
.btn-refresh {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: rgba(34,197,94,.08);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--accent2);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
}
.btn-refresh:hover { background: rgba(34,197,94,.15); }
.btn-refresh.loading { opacity: .6; pointer-events: none; }
.spin { display: inline-block; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PAGE ── */
.page {
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 16px 60px;
  position: relative;
  z-index: 1;
}

/* ── SUMMARY CARDS ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
@media (min-width: 600px) {
  .summary-grid { grid-template-columns: repeat(4, 1fr); }
}
.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: border-color .15s;
}
.sum-card:hover { border-color: var(--border2); }
.sum-icon { font-size: 18px; margin-bottom: 4px; }
.sum-val {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
}
.sum-lbl {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  letter-spacing: .04em;
}
.sum-card.c-cyan .sum-val  { color: var(--cyan); }
.sum-card.c-amber .sum-val { color: var(--amber); }
.sum-card.c-blue .sum-val  { color: var(--blue); }

/* ── SECTION ── */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 16px;
}
.sec-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(90deg, var(--raised), var(--surface));
}
.sec-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: .06em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-body { padding: 16px; }

/* ── DEVICE BREAKDOWN ── */
.device-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.device-row {
  display: flex;
  align-items: center;
  gap: 10px;
  direction: ltr;
}
.device-lbl {
  font-size: 12px;
  color: var(--text2);
  font-family: var(--mono);
  width: 140px;
  flex-shrink: 0;
  text-align: right;
  direction: rtl;
}
.device-bar-wrap {
  flex: 1;
  height: 8px;
  background: var(--raised);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.device-bar-fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .6s ease;
}
.device-count {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  width: 30px;
  text-align: left;
  flex-shrink: 0;
}

/* ── USERS TABLE ── */
.users-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  direction: rtl;
}
.users-table th {
  text-align: right;
  padding: 8px 10px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: .06em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  white-space: nowrap;
}
.users-table td {
  padding: 10px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  vertical-align: middle;
}
.users-table tr:last-child td { border-bottom: none; }
.users-table tr:hover td { background: var(--raised); }
.user-name {
  font-weight: 700;
  color: var(--text);
}
.user-id {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
}
.device-tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 20px;
  font-family: var(--mono);
  font-weight: 600;
}
.dt-android { background: rgba(34,197,94,.1);  color: var(--accent2); border: 1px solid rgba(34,197,94,.2); }
.dt-ios     { background: rgba(251,191,36,.1); color: var(--amber);   border: 1px solid rgba(251,191,36,.2); }
.dt-pc      { background: rgba(96,165,250,.1); color: var(--blue);    border: 1px solid rgba(96,165,250,.2); }
.dt-other   { background: rgba(148,163,184,.1);color: var(--text3);   border: 1px solid var(--border); }
.flights-num {
  font-family: var(--mono);
  font-weight: 700;
  color: var(--accent2);
}
.last-seen {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}

/* ── ACTIVITY FEED ── */
.feed-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.feed-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  direction: ltr;
}
.feed-item:last-child { border-bottom: none; }
.feed-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.fd-open     { background: var(--blue); }
.fd-recorded { background: var(--accent); }
.fd-archived { background: var(--red); }
.fd-setup    { background: var(--amber); }
.feed-content {
  flex: 1;
  min-width: 0;
  direction: rtl;
}
.feed-event {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.feed-meta {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  margin-top: 1px;
}
.feed-time {
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
  flex-shrink: 0;
  text-align: left;
}

/* ── ACTIVITY CHART ── */
.chart-wrap {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 80px;
  direction: ltr;
}
.chart-bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  height: 100%;
  justify-content: flex-end;
}
.chart-bar {
  width: 100%;
  border-radius: 4px 4px 0 0;
  background: linear-gradient(180deg, var(--accent2), var(--accent));
  transition: height .5s ease;
  min-height: 2px;
}
.chart-lbl {
  font-size: 9px;
  color: var(--text3);
  font-family: var(--mono);
  white-space: nowrap;
}

/* ── FEED PILLS ── */
.feed-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--raised);
  color: var(--text3);
  cursor: pointer;
  transition: all .12s;
  font-family: var(--sans);
}
.feed-pill:hover { border-color: var(--border2); color: var(--text2); }
.feed-pill.active { background: rgba(34,197,94,.1); border-color: var(--accent); color: var(--accent2); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 32px 0;
  color: var(--text3);
  font-size: 13px;
}

/* ── LOADING ── */
.skeleton {
  background: linear-gradient(90deg, var(--raised) 25%, var(--hover) 50%, var(--raised) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ── FOOTER ── */
.admin-footer {
  text-align: center;
  padding: 20px;
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="admin-header">
  <div class="admin-logo">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="admin-title">✈ AirLog</div>
      <div class="admin-badge">🛡 ADMIN</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-refresh" id="btnRefresh" onclick="loadAll()">
      <span id="refreshIcon">↻</span> רענן
    </button>
  </div>
</div>

<!-- PAGE -->
<div class="page">

  <!-- SUMMARY CARDS -->
  <div class="summary-grid">
    <div class="sum-card">
      <div class="sum-icon">👥</div>
      <div class="sum-val" id="sumUsers">—</div>
      <div class="sum-lbl">משתמשים</div>
    </div>
    <div class="sum-card c-cyan">
      <div class="sum-icon">✈</div>
      <div class="sum-val" id="sumFlights">—</div>
      <div class="sum-lbl">טיסות נרשמו</div>
    </div>
    <div class="sum-card c-amber">
      <div class="sum-icon">🆕</div>
      <div class="sum-val" id="sumNew">—</div>
      <div class="sum-lbl">הרשמות</div>
    </div>
    <div class="sum-card c-blue">
      <div class="sum-icon">📲</div>
      <div class="sum-val" id="sumOpens">—</div>
      <div class="sum-lbl">כניסות השבוע</div>
    </div>
  </div>

  <!-- ACTIVITY CHART -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-title">📈 פעילות — 14 ימים אחרונים</div>
    </div>
    <div class="sec-body">
      <div class="chart-wrap" id="activityChart">
        <div class="empty-state" style="width:100%;">טוען...</div>
      </div>
    </div>
  </div>

  <!-- USERS TABLE + DEVICE BREAKDOWN side by side on wide screens -->
  <div style="display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:16px;" id="midGrid">

    <!-- USERS TABLE -->
    <div class="section">
      <div class="sec-head" onclick="toggleUsers()" style="cursor:pointer;">
        <div class="sec-title">👤 משתמשים</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="font-size:11px;color:var(--text3);font-family:var(--mono);" id="usersCount"></div>
          <span id="usersChevron" style="font-size:12px;color:var(--text3);transition:transform .2s;display:inline-block;">▼</span>
        </div>
      </div>
      <div id="usersBody" style="overflow-x:auto;">
        <table class="users-table" id="usersTable">
          <thead>
            <tr>
              <th>שם גיליון</th>
              <th>טיסות</th>
              <th>נראה לאחרונה</th>
              <th>סה"כ כניסות</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text3);">טוען...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- DEVICE BREAKDOWN -->
    <div class="section">
      <div class="sec-head">
        <div class="sec-title">📱 פילוח מכשירים</div>
      </div>
      <div class="sec-body">
        <div class="device-grid" id="deviceGrid">
          <div class="empty-state">טוען...</div>
        </div>
      </div>
    </div>

  </div>

  <!-- RECENT ACTIVITY FEED -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-title">⚡ פעילות אחרונה</div>
    </div>
    <div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;direction:rtl;align-items:center;">
      <span style="font-size:11px;color:var(--text3);align-self:center;">סינון אירוע:</span>
      <button class="feed-pill active" onclick="setFeedFilter('all')" id="fp-all">הכל</button>
      <button class="feed-pill" onclick="setFeedFilter('flight_recorded')" id="fp-flight_recorded">✈ רישום טיסה</button>
      <button class="feed-pill" onclick="setFeedFilter('app_open')" id="fp-app_open">📲 כניסות</button>
      <button class="feed-pill" onclick="setFeedFilter('flight_archived')" id="fp-flight_archived">🗄 ארכוב טיסה</button>
      <button class="feed-pill" onclick="setFeedFilter('setup_completed')" id="fp-setup_completed">🆕 הצטרפות</button>
    </div>
    <div style="padding:8px 16px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px;direction:rtl;align-items:center;">
      <span style="font-size:11px;color:var(--text3);align-self:center;">משתמש:</span>
      <select id="feedUserFilter" onchange="renderFeed()"
        style="font-family:var(--sans);font-size:12px;background:var(--raised);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 8px;outline:none;cursor:pointer;">
        <option value="all">כולם</option>
      </select>
      <div style="flex:1;min-width:8px;"></div>
      <span style="font-size:11px;color:var(--text3);align-self:center;">טווח:</span>
      <button class="feed-pill active" onclick="setFeedRange(20)" id="fr-20">20 אחרונים</button>
      <button class="feed-pill" onclick="setFeedRange(90)" id="fr-90">3 חודשים</button>
      <button class="feed-pill" onclick="setFeedRange(0)" id="fr-0">הכל</button>
    </div>
    <div class="sec-body" style="padding:0 16px;">
      <div class="feed-list" id="feedList">
        <div class="empty-state" style="padding:24px 0;">טוען...</div>
      </div>
    </div>
  </div>

</div>

<div class="admin-footer">
  <div style="font-family:var(--mono);font-size:10px;color:var(--text3);">v1.51 <span id="footerUpdateTime"></span></div>
  <div style="font-size:11px;color:var(--text2);margin-top:2px;">built by eligrt</div>
</div>

<script>
const ADMIN_GAS_URL = 'https://script.google.com/macros/s/AKfycbwMROMQAzdAz-dCNdAbLn2axJ9X9vQW8ibWr3bFI6A35hRJIn9-pLJUVvDhlmT6IY8/exec';

let allEvents = [];
let _feedFilter = 'all';
let _feedRange  = 20;

function setFeedFilter(f) {
  _feedFilter = f;
  document.querySelectorAll('[id^="fp-"]').forEach(el => el.classList.remove('active'));
  const btn = document.getElementById('fp-' + f);
  if (btn) btn.classList.add('active');
  renderFeed();
}

function setFeedRange(r) {
  _feedRange = r;
  document.querySelectorAll('[id^="fr-"]').forEach(el => el.classList.remove('active'));
  const btn = document.getElementById('fr-' + r);
  if (btn) btn.classList.add('active');
  renderFeed();
}

// ── LOAD ────────────────────────────────────────────────────────
async function loadAll() {
  const btn  = document.getElementById('btnRefresh');
  const icon = document.getElementById('refreshIcon');
  btn.classList.add('loading');
  icon.classList.add('spin');

  try {
    const res  = await fetch(ADMIN_GAS_URL + '?action=getEvents');
    const data = await res.json();
    allEvents  = data.events || [];
    render();
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    const footer = document.getElementById('footerUpdateTime');
    if (footer) footer.textContent = '· עודכן ' + timeStr;
  } catch(e) {
    const ft = document.getElementById('footerUpdateTime');
    if (ft) ft.textContent = '· ⚠ שגיאת טעינה';
    console.error(e);
  }

  btn.classList.remove('loading');
  icon.classList.remove('spin');
}

// ── RENDER ALL ──────────────────────────────────────────────────
function render() {
  renderSummary();
  renderChart();
  renderUsers();
  renderDevices();
  populateUserDropdown();
  renderFeed();
}

function populateUserDropdown() {
  const sel = document.getElementById('feedUserFilter');
  if (!sel) return;
  const current = sel.value;
  // Get unique users with names
  const users = {};
  allEvents.forEach(e => {
    if (e.userId && e.sheetName) users[e.userId] = e.sheetName;
  });
  sel.innerHTML = '<option value="all">כולם</option>' +
    Object.entries(users).map(([id, name]) =>
      `<option value="${id}">${name}</option>`
    ).join('');
  if (current && current !== 'all') sel.value = current;
}

// ── SUMMARY CARDS ───────────────────────────────────────────────
function renderSummary() {
  const uniqueUsers  = new Set(allEvents.map(e => e.userId).filter(Boolean)).size;
  const flightsTotal = allEvents.filter(e => e.event === 'flight_recorded').length;
  const newUsers     = allEvents.filter(e => e.event === 'setup_completed').length;

  const weekAgo = new Date();
  weekAgo.setDate(weekAgo.getDate() - 7);
  const opensWeek = allEvents.filter(e => {
    return e.event === 'app_open' && parseDate(e.timestamp) >= weekAgo;
  }).length;

  document.getElementById('sumUsers').textContent   = uniqueUsers;
  document.getElementById('sumFlights').textContent = flightsTotal;
  document.getElementById('sumNew').textContent     = newUsers;
  document.getElementById('sumOpens').textContent   = opensWeek;
}

// ── ACTIVITY CHART (14 days) ────────────────────────────────────
function renderChart() {
  const wrap = document.getElementById('activityChart');
  const days = 14;
  const buckets = {};

  for (let i = days - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    buckets[fmtDay(d)] = 0;
  }

  allEvents.forEach(e => {
    if (e.event !== 'flight_recorded' && e.event !== 'app_open') return;
    const d = fmtDay(parseDate(e.timestamp));
    if (d in buckets) buckets[d]++;
  });

  const vals   = Object.values(buckets);
  const labels = Object.keys(buckets);
  const maxVal = Math.max(...vals, 1);

  wrap.innerHTML = labels.map((lbl, i) => {
    const pct = Math.round((vals[i] / maxVal) * 100);
    // Convert yyyy-mm-dd to dd/mm
    const parts = lbl.split('-');
    const short = parts[2] + '/' + parts[1];
    return `
      <div class="chart-bar-col">
        <div class="chart-bar" style="height:${Math.max(pct, 2)}%;" title="${vals[i]} אירועים"></div>
        <div class="chart-lbl">${short}</div>
      </div>`;
  }).join('');
}

// ── USERS TABLE ─────────────────────────────────────────────────
function renderUsers() {
  // Build per-user summary
  const users = {};
  allEvents.forEach(e => {
    const id = e.userId || 'unknown';
    if (!users[id]) {
      users[id] = {
        id,
        name:      e.sheetName || '—',
        device:    e.device    || '—',
        os:        e.os        || '—',
        flights:   0,
        opens:     0,
        lastSeen:  null
      };
    }
    // Update name to latest
    if (e.sheetName) users[id].name = e.sheetName;
    if (e.device)    users[id].device = e.device;
    if (e.os)        users[id].os = e.os;
    if (e.event === 'app_open') users[id].opens++;
    if (e.event === 'flight_recorded') users[id].flights++;
    // Track max flights in sheet
    if (e.totalFlights) users[id].flights = Math.max(users[id].flights, parseInt(e.totalFlights) || 0);

    const ts = parseDate(e.timestamp);
    if (!users[id].lastSeen || ts > users[id].lastSeen) users[id].lastSeen = ts;
  });

  const sorted = Object.values(users).sort((a, b) => (b.lastSeen || 0) - (a.lastSeen || 0));
  document.getElementById('usersCount').textContent = sorted.length + ' משתמשים';

  if (!sorted.length) {
    document.getElementById('usersTableBody').innerHTML =
      '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text3);">אין נתונים</td></tr>';
    return;
  }

  document.getElementById('usersTableBody').innerHTML = sorted.map(u => `
    <tr>
      <td>
        <div class="user-name">${u.name}</div>
        <div class="user-id">${u.id}</div>
      </td>
      <td><span class="flights-num">${u.flights}</span></td>
      <td><span class="last-seen">${u.lastSeen ? fmtRelative(u.lastSeen) : '—'}</span></td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--text3);">${u.opens}</td>
    </tr>
  `).join('');
}

// ── DEVICE BREAKDOWN ────────────────────────────────────────────
function renderDevices() {
  const counts = {};

  // Count ALL events per device type (not just unique users)
  allEvents.forEach(e => {
    if (!e.device) return;
    const type = getDeviceType(e.device);
    counts[type] = (counts[type] || 0) + 1;
  });

  const total  = Object.values(counts).reduce((a, b) => a + b, 0) || 1;
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  if (!sorted.length) {
    document.getElementById('deviceGrid').innerHTML = '<div class="empty-state">אין נתונים</div>';
    return;
  }

  // Colors per device type
  const colors = {
    'Android': '#22c55e',
    'iPhone':  '#fbbf24',
    'iPad':    '#f59e0b',
    'Desktop': '#60a5fa',
    'Unknown': '#4a6f96'
  };

  document.getElementById('deviceGrid').innerHTML = sorted.map(([type, count]) => {
    const pct   = Math.round(count / total * 100);
    const color = colors[type] || '#4a6f96';
    return `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;direction:ltr;">
        <div style="width:90px;font-size:12px;font-family:var(--mono);color:var(--text2);text-align:right;flex-shrink:0;">${type}</div>
        <div style="flex:1;height:10px;background:var(--raised);border-radius:10px;overflow:hidden;border:1px solid var(--border);">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:10px;transition:width .6s ease;"></div>
        </div>
        <div style="width:40px;font-size:11px;font-family:var(--mono);color:var(--text3);text-align:left;flex-shrink:0;">${pct}% <span style="color:var(--text3);font-size:10px;">(${count})</span></div>
      </div>`;
  }).join('');
}

// ── ACTIVITY FEED ────────────────────────────────────────────────
function renderFeed() {
  let events = [...allEvents].sort((a, b) => parseDate(b.timestamp) - parseDate(a.timestamp));

  // Apply user filter
  const userSel = document.getElementById('feedUserFilter');
  const userFilter = userSel ? userSel.value : 'all';
  if (userFilter !== 'all') {
    events = events.filter(e => e.userId === userFilter);
  }

  // Apply event type filter
  if (_feedFilter !== 'all') {
    events = events.filter(e => e.event === _feedFilter);
  }

  // Apply time range
  if (_feedRange === 20) {
    events = events.slice(0, 20);
  } else if (_feedRange === 90) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 90);
    events = events.filter(e => parseDate(e.timestamp) >= cutoff);
  }
  // _feedRange === 0 means all — no slice

  if (!events.length) {
    document.getElementById('feedList').innerHTML = '<div class="empty-state" style="padding:24px 0;">אין אירועים</div>';
    return;
  }

  const eventLabels = {
    'app_open':         '📲 כניסה לאפליקציה',
    'flight_recorded':  '✈ רשם טיסה',
    'flight_archived':  '🗄 ארכב טיסה',
    'setup_completed':  '🆕 הצטרף למערכת'
  };
  const dotClass = {
    'app_open':        'fd-open',
    'flight_recorded': 'fd-recorded',
    'flight_archived': 'fd-archived',
    'setup_completed': 'fd-setup'
  };

  document.getElementById('feedList').innerHTML = events.map(e => `
    <div class="feed-item">
      <div class="feed-dot ${dotClass[e.event] || 'fd-open'}"></div>
      <div class="feed-content">
        <div class="feed-event">${eventLabels[e.event] || e.event}</div>
        <div class="feed-meta">${e.sheetName || '—'} · ${e.device || '—'}</div>
      </div>
      <div class="feed-time">${fmtRelative(parseDate(e.timestamp))}</div>
    </div>
  `).join('');
}

// ── HELPERS ──────────────────────────────────────────────────────
function parseDate(str) {
  if (!str) return new Date(0);
  // Format: dd/MM/yyyy HH:mm:ss
  const m = str.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
  if (m) return new Date(m[3], m[2]-1, m[1], m[4], m[5]);
  return new Date(str);
}

function fmtDay(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function fmtRelative(d) {
  if (!d || d.getTime() === 0) return '—';
  const diff = Date.now() - d.getTime();
  const min  = Math.floor(diff / 60000);
  const hr   = Math.floor(min / 60);
  const day  = Math.floor(hr / 24);
  if (min < 2)   return 'עכשיו';
  if (min < 60)  return `לפני ${min} דק'`;
  if (hr < 24)   return `לפני ${hr} שע'`;
  if (day < 7)   return `לפני ${day} ימים`;
  return d.toLocaleDateString('he-IL');
}

function getDeviceType(device) {
  if (!device || device === '—') return 'Unknown';
  if (/iPhone/i.test(device))  return 'iPhone';
  if (/iPad/i.test(device))    return 'iPad';
  if (/Android/i.test(device) || /samsung|xiaomi|huawei|pixel|redmi|oppo|vivo/i.test(device)) return 'Android';
  if (/Mac|PC|Windows|Linux|Android device/i.test(device)) return 'Desktop';
  // Short model names that Android reports (like "K") — treat as Android
  if (device.length <= 3) return 'Android';
  return device;
}

function deviceClass(device) {
  const t = getDeviceType(device);
  if (t === 'iPhone' || t === 'iPad') return 'dt-ios';
  if (t === 'Android') return 'dt-android';
  if (t === 'Desktop') return 'dt-pc';
  return 'dt-other';
}

let _usersOpen = true;
function toggleUsers() {
  _usersOpen = !_usersOpen;
  const body    = document.getElementById('usersBody');
  const chevron = document.getElementById('usersChevron');
  body.style.display    = _usersOpen ? '' : 'none';
  chevron.style.transform = _usersOpen ? '' : 'rotate(-90deg)';
}

// ── INIT ─────────────────────────────────────────────────────────
loadAll();
// Auto-refresh every 5 minutes
setInterval(loadAll, 5 * 60 * 1000);
</script>
